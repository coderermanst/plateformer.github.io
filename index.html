<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>50-Level Action Platformer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        #gameContainer {
            text-align: center;
        }
        #ui {
            display: flex;
            justify-content: space-between;
            width: 800px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0px #000;
        }
        canvas {
            background: #222;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="ui">
        <span id="levelDisplay">LEVEL: 1 / 50</span>
        <span id="deathsDisplay">DEATHS: 0</span>
    </div>
    <canvas id="gameCanvas" width="800" height="450"></canvas>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game Mechanics Configuration
const gravity = 0.5;
const keys = {};
let currentLevel = 1;
let deathCount = 0;

// Game State Entities
const player = {
    x: 50, y: 350, width: 24, height: 24,
    speed: 4.5, velX: 0, velY: 0,
    jumping: false, grounded: false, color: "#00E5FF"
};

let platforms = [];
let spikes = [];
let enemies = [];
let goal = { x: 740, y: 370, width: 30, height: 50 };

// Controls Listeners
window.addEventListener("keydown", (e) => { keys[e.code] = true; });
window.addEventListener("keyup", (e) => { keys[e.code] = false; });

// Deterministic Pseudo-Random Generator to ensure fixed layouts per level
function seededRandom(seed) {
    let x = Math.sin(seed++) * 10000;
    return x - Math.floor(x);
}

// Procedural Generation Engine for 50 Levels
function generateLevel(levelNum) {
    platforms = [
        { x: 0, y: 420, width: 800, height: 30 } // Universal Floor
    ];
    spikes = [];
    enemies = [];
    
    // Reset Entity Positions
    player.x = 40;
    player.y = 350;
    player.velX = 0;
    player.velY = 0;
    
    let seed = levelNum * 123.45;
    
    // Generate stairs & gaps dynamically scaling up with complexity
    let currentX = 150;
    let currentY = 320;
    const numPlatforms = 4 + Math.floor(levelNum / 8); 

    for (let i = 0; i < numPlatforms; i++) {
        let pWidth = 100 + Math.floor(seededRandom(seed++) * 80);
        platforms.push({ x: currentX, y: currentY, width: pWidth, height: 15 });
        
        // Populate Hazards based on randomness and difficulty thresholds
        if (seededRandom(seed++) > 0.4) {
            // Place Spikes
            let spikeX = currentX + 20 + (seededRandom(seed++) * (pWidth - 50));
            spikes.push({ x: spikeX, y: currentY - 12, width: 16, height: 12 });
        } else if (levelNum > 2 && seededRandom(seed++) > 0.4) {
            // Place Patrol Enemy
            enemies.push({
                x: currentX + 10,
                y: currentY - 20,
                width: 20,
                height: 20,
                startX: currentX,
                endX: currentX + pWidth - 20,
                speed: 1 + (levelNum * 0.05), // Speed scales up slightly per level
                dir: 1
            });
        }

        // Advance layout coordinate grids chain-linked forward
        currentX += pWidth + 30 + Math.floor(seededRandom(seed++) * 40);
        currentY += (seededRandom(seed++) > 0.5 ? -40 : 40);
        
        // Clamping vertical limits securely inside boundary viewing windows
        if (currentY < 120) currentY = 160;
        if (currentY > 360) currentY = 320;
        if (currentX > 650) break;
    }

    // Place Floor Hazards to add extra challenge in higher levels
    if (levelNum > 5) {
        let floorSpikesCount = Math.min(2 + Math.floor(levelNum / 10), 6);
        for(let i = 0; i < floorSpikesCount; i++) {
            let fx = 200 + (seededRandom(seed++) * 400);
            spikes.push({ x: fx, y: 408, width: 16, height: 12 });
        }
    }

    // Set Exit Door Position securely on final screen space coordinates
    goal.x = 740;
    goal.y = 370;

    // UI Feedback Updates
    document.getElementById("levelDisplay").innerText = `LEVEL: ${levelNum} / 50`;
    document.getElementById("deathsDisplay").innerText = `DEATHS: ${deathCount}`;
}

function handleDeath() {
    deathCount++;
    generateLevel(currentLevel);
}

// Box Collision Handler Engine
function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

// Core Simulation Loop
function update() {
    // Process Inputs Axis
    if (keys["ArrowRight"] || keys["KeyD"]) {
        if (player.velX < player.speed) player.velX += 0.8;
    } else if (keys["ArrowLeft"] || keys["KeyA"]) {
        if (player.velX > -player.speed) player.velX -= 0.8;
    } else {
        player.velX *= 0.8; // Dampening Drag/Friction
    }

    if ((keys["ArrowUp"] || keys["KeyW"] || keys["Space"]) && !player.jumping && player.grounded) {
        player.jumping = true;
        player.grounded = false;
        player.velY = -10.5;
    }

    // Physics Engine Forces
    player.velY += gravity;
    player.grounded = false;

    // Resolve X Movement Axis
    player.x += player.velX;
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

    // Resolve Y Movement Axis
    player.y += player.velY;

    // Handle Platform Collisions System
    for (let i = 0; i < platforms.length; i++) {
        let plat = platforms[i];
        if (checkCollision(player, plat)) {
            if (player.velY > 0 && (player.y + player.height - player.velY) <= plat.y) {
                player.grounded = true;
                player.jumping = false;
                player.velY = 0;
                player.y = plat.y - player.height;
            } else if (player.velY < 0 && (player.y - player.velY) >= plat.y + plat.height) {
                player.velY = 0;
                player.y = plat.y + plat.height;
            }
        }
    }

    // Update & Collision check for Enemies
    for (let i = 0; i < enemies.length; i++) {
        let e = enemies[i];
        e.x += e.speed * e.dir;
        
        // Reverse direction at patrol edges
        if (e.x <= e.startX || e.x + e.width >= e.endX) {
            e.dir *= -1;
        }

        // Kill player on touch
        if (checkCollision(player, e)) {
            handleDeath();
            return requestAnimationFrame(update);
        }
    }

    // Collision Check for Spikes
    for (let i = 0; i < spikes.length; i++) {
        if (checkCollision(player, spikes[i])) {
            handleDeath();
            return requestAnimationFrame(update);
        }
    }

    // Goal Detection Engine (Progressing Levels)
    if (checkCollision(player, goal)) {
        currentLevel++;
        if (currentLevel > 50) {
            alert(`Victory! You beat all 50 levels with ${deathCount} deaths!`);
            currentLevel = 1;
            deathCount = 0;
        }
        generateLevel(currentLevel);
    }

    render();
    requestAnimationFrame(update);
}

// Visuals Rendering Function
function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Render Environment Background Lines
    ctx.strokeStyle = "#2a2a2a";
    for(let i=0; i<canvas.width; i+=40) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }

    // Draw Exit Goal Doorway
    ctx.fillStyle = "#FFD700";
    ctx.fillRect(goal.x, goal.y, goal.width, goal.height);

    // Draw Map Environment Platforms
    ctx.fillStyle = "#4CAF50";
    for (let i = 0; i < platforms.length; i++) {
        let p = platforms[i];
        ctx.fillRect(p.x, p.y, p.width, p.height);
    }

    // Draw Triangular Pointed Spikes
    ctx.fillStyle = "#FF5252";
    for (let i = 0; i < spikes.length; i++) {
        let s = spikes[i];
        ctx.beginPath();
        ctx.moveTo(s.x, s.y + s.height);
        ctx.lineTo(s.x + (s.width / 2), s.y);
        ctx.lineTo(s.x + s.width, s.y + s.height);
        ctx.fill();
    }

    // Draw Patrol Enemies
    ctx.fillStyle = "#E040FB";
    for (let i = 0; i < enemies.length; i++) {
        let e = enemies[i];
        ctx.fillRect(e.x, e.y, e.width, e.height);
    }

    // Draw Active Player Character
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

// Initialization Entrypoint
generateLevel(currentLevel);
update();
</script>
</body>
</html>
