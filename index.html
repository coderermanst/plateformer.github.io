<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 Canvas Platformer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }
        canvas {
            background: #333;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas" width="800" height="400"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game variables
const gravity = 0.5;
const keys = {};

// Player object
const player = {
    x: 50,
    y: 300,
    width: 30,
    height: 30,
    speed: 5,
    velX: 0,
    velY: 0,
    jumping: false,
    grounded: false,
    color: "#ff5722"
};

// Platforms array (X, Y, Width, Height)
const platforms = [
    { x: 0, y: 380, width: 800, height: 20 },   // Ground
    { x: 200, y: 280, width: 120, height: 15 }, // Platform 1
    { x: 400, y: 220, width: 150, height: 15 }, // Platform 2
    { x: 150, y: 150, width: 100, height: 15 }, // Platform 3
    { x: 600, y: 130, width: 120, height: 15 }  // Platform 4
];

// Event listeners for controls
window.addEventListener("keydown", (e) => { keys[e.code] = true; });
window.addEventListener("keyup", (e) => { keys[e.code] = false; });

// Main game loop
function update() {
    // Left / Right controls
    if (keys["ArrowRight"] || keys["KeyD"]) {
        if (player.velX < player.speed) player.velX++;
    }
    if (keys["ArrowLeft"] || keys["KeyA"]) {
        if (player.velX > -player.speed) player.velX--;
    }

    // Up / Jump controls
    if ((keys["ArrowUp"] || keys["KeyW"] || keys["Space"]) && !player.jumping && player.grounded) {
        player.jumping = true;
        player.grounded = false;
        player.velY = -12; // Jump force
    }

    // Apply physics
    player.velX *= 0.85; // Friction
    player.velY += gravity; // Gravity

    player.grounded = false;

    // Move player horizontally and check map boundaries
    player.x += player.velX;
    if (player.x < 0) player.x = 0;
    if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

    // Move player vertically
    player.y += player.velY;

    // Collision detection with platforms
    for (let i = 0; i < platforms.length; i++) {
        let plat = platforms[i];
        
        // AABB Collision Detection
        if (player.x < plat.x + plat.width &&
            player.x + player.width > plat.x &&
            player.y < plat.y + plat.height &&
            player.y + player.height > plat.y) {
            
            // Check if falling down onto a platform
            if (player.velY > 0 && (player.y + player.height - player.velY) <= plat.y) {
                player.grounded = true;
                player.jumping = false;
                player.velY = 0;
                player.y = plat.y - player.height;
            } 
            // Check if hitting underside of a platform
            else if (player.velY < 0 && (player.y - player.velY) >= plat.y + plat.height) {
                player.velY = 0;
                player.y = plat.y + plat.height;
            }
        }
    }

    // Safety net if player falls through floor
    if (player.y > canvas.height) {
        player.x = 50;
        player.y = 300;
        player.velX = 0;
        player.velY = 0;
    }

    // Render the screen
    draw();

    requestAnimationFrame(update);
}

// Draw function
function draw() {
    // Clear canvas
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw background grid lines (optional visual effect)
    ctx.strokeStyle = "#444";
    ctx.lineWidth = 1;
    for(let i=0; i<canvas.width; i+=40) {
        ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
    }

    // Draw platforms
    ctx.fillStyle = "#8bc34a"; // Green platforms
    for (let i = 0; i < platforms.length; i++) {
        let plat = platforms[i];
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
    }

    // Draw player
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.width, player.height);
}

// Start game loop
update();
</script>
</body>
</html>
